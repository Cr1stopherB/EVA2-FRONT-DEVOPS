<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Innovatech | Panel de Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* CSS Premium Moderno */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --secondary: #475569;
      --secondary-hover: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
    }

    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      padding: 24px 0;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    
    header h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    header p {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-weight: 300;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    section {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    section:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-top: 0;
      font-size: 1.75rem;
      font-weight: 600;
      color: #e2e8f0;
      border-bottom: 2px solid rgba(255,255,255,0.05);
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    .actions {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      background: var(--primary);
      color: white;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
    }

    button.secondary {
      background: var(--secondary);
      box-shadow: 0 4px 14px 0 rgba(71, 85, 105, 0.39);
    }

    button.secondary:hover {
      background: var(--secondary-hover);
      box-shadow: 0 6px 20px rgba(71, 85, 105, 0.23);
    }

    button.danger {
      background: var(--danger);
      box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
    }

    button.danger:hover {
      background: var(--danger-hover);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.23);
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--card-border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    th {
      background: rgba(255,255,255,0.03);
      font-weight: 600;
      color: #cbd5e1;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    td button {
      padding: 6px 12px;
      font-size: 0.85rem;
      box-shadow: none;
    }
    
    td button:hover {
      transform: scale(1.05);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-family: 'Outfit', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .status {
      margin-top: 16px;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    .status:not(:empty) {
      display: block;
    }
    .status.ok {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>Innovatech 🚀</h1>
    <p>Gestión de Inventario Tecnológico</p>
  </header>
  <main>
    <section>
      <h2>Catálogo de Productos</h2>
      <div class="actions">
        <button id="btnCargar">Actualizar Inventario</button>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyProductos">
            <!-- Filas dinámicas -->
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 id="formTitle">Nuevo Producto</h2>
      <div class="form-grid">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: Laptop Gamer RTX 4060" />
        </div>
        <div>
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="2" placeholder="Ej: 16GB RAM, SSD 1TB, Pantalla 144Hz"></textarea>
        </div>
        <div>
          <label for="precio">Precio ($)</label>
          <input type="number" id="precio" step="1" min="0" placeholder="Ej: 1299000" />
        </div>
        <div>
          <label for="stock">Stock disponible</label>
          <input type="number" id="stock" min="0" placeholder="Ej: 15" />
        </div>
      </div>
      <div class="actions" style="margin-top: 24px;">
        <button id="btnGuardar">Guardar Producto</button>
        <button id="btnCancelar" class="secondary">Cancelar</button>
      </div>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
